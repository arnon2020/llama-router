<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>llama-router</title>
    <link rel="stylesheet" href="/static/css/main.css">
    <link rel="stylesheet" href="/static/css/dashboard.css">
    <link rel="stylesheet" href="/static/css/chat.css">
    <link rel="icon" href="/static/favicon.ico" type="image/x-icon">
    <style>
        .logo {
            color: #e0e0e0;
            text-decoration: none;
        }
        .main-nav {
            display: flex;
            gap: 0.25rem;
        }
        .nav-link {
            padding: 0.75rem 1.5rem;
            background: transparent;
            border: none;
            color: #888;
            text-decoration: none;
            cursor: pointer;
            font-size: 1rem;
            border-bottom: 2px solid transparent;
            transition: all 0.2s;
        }
        .nav-link:hover {
            color: #e0e0e0;
        }
        .nav-link.active {
            color: #60a5fa;
            border-bottom-color: #60a5fa;
        }
        .header {
            background: #2d2d2d;
            padding: 1rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #3d3d3d;
        }
        .header h1 {
            font-size: 1.5rem;
            font-weight: 600;
        }
    </style>
</head>
<body>
    <header class="header">
        <h1><a href="/" class="logo">llama-router</a></h1>
        <nav class="main-nav">
            <a href="/" class="nav-link active" data-page="dashboard">Dashboard</a>
            <a href="/chat" class="nav-link" data-page="chat">Chat</a>
            <a href="/models" class="nav-link" data-page="models">Models</a>
            <a href="/profiles" class="nav-link" data-page="profiles">Profiles</a>
            <a href="/downloads" class="nav-link" data-page="downloads">Downloads</a>
            <a href="/settings" class="nav-link" data-page="settings">Settings</a>
        </nav>
        <div class="status" id="status">
            <div class="status-dot"></div>
            <span id="status-text">Checking...</span>
        </div>
    </header>

    <main class="container">
        <div id="alert-container"></div>
        <div id="page-content">
            {% block content %}{% endblock %}
        </div>
    </main>

    <script src="/static/js/store.js"></script>
    <script src="/static/js/models.js"></script>
    <script src="/static/js/config.js"></script>
    <script src="/static/js/downloads.js"></script>
    <script src="/static/js/metrics.js"></script>
    <script src="/static/js/profiles.js"></script>
    <script src="/static/js/add-model.js"></script>
    <script src="/static/js/chat.js"></script>
    <script src="/static/js/main.js"></script>
</body>
</html>
